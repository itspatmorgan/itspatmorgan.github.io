<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512">
  <style>
    #light { display: none; }
    #dark { display: block; }
    @media (prefers-color-scheme: dark) {
      #dark { display: none; }
      #light { display: block; }
    }
  </style>
  <image id="dark" width="512" height="512" href="data:image/png;base64," />
  <image id="light" width="512" height="512" href="data:image/png;base64," />
</svg>
